name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        
      - name: Install Python
        run: uv python install 3.12
        
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run ruff check
        run: uv run ruff check koa/ tests/
        
      - name: Run ruff format check
        run: uv run ruff format --check koa/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        
      - name: Install Python
        run: uv python install 3.12
        
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run mypy
        run: uv run mypy koa/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: koa
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: koa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://koa:testpass@localhost:5432/koa_test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        
      - name: Install Python
        run: uv python install 3.12
        
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run tests
        run: uv run pytest tests/ -x -v --ignore=tests/integration -q 2>&1 | tail -40